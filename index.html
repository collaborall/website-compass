<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decoding Circular Capacity of Buildings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: #b8c8c0;
      overflow-x: hidden;
    }

    /* ── Full-page hero ── */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      background: url("./260506-background-login-dashboard.jpg") center/cover no-repeat;
    }

    /* Preview image — layer 0 (below overlay) */
    .preview-img {
      position: absolute;
      top: 70px;
      right: 20px;
      z-index: 0;
      width: clamp(100px, 14vw, 200px);
      border-radius: 10px;
      display: block;
    }

    /* Semi-transparent overlay — layer 1 (covers both background AND preview image) */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(235, 242, 238, 0.52);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Top bar — layer 2 ── */
    .topbar {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(6px);
      flex-wrap: wrap;
      min-height: 64px;
    }

    .logo-pill img {
      max-height: 48px;
      max-width: 130px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* ── Main content — layer 2 ── */
    .content {
      position: relative;
      z-index: 3;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: clamp(40px, 6vw, 80px);
      padding: clamp(48px, 10vw, 120px) clamp(20px, 5vw, 80px) clamp(32px, 5vw, 72px);
    }

    /* ── Title ── */
    h1 {
      text-align: center;
      font-size: clamp(20px, 3.6vw, 52px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.65);
      line-height: 1.15;
      width: 100%;
    }

    /* ── Two-button grid ── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 2.5vw, 36px);
      width: 100%;
      max-width: 820px;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 0.8vw, 10px);
      padding: clamp(20px, 3vw, 44px) clamp(24px, 3.5vw, 52px);
      aspect-ratio: 530 / 330;
      border-radius: 50px;
      text-decoration: none;
      color: #fff;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      text-align: center;
      line-height: 1.4;
    }

    .tool-btn:hover  { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22); }
    .tool-btn:active { transform: translateY(0); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.18); }

    .tool-btn.dashboard { background: #4EA72E; }
    .tool-btn.rpindex   { background: #C4DB20; color: #0E2841; }

    .tool-btn .label-small {
      font-size: clamp(10px, 1.6vw, 26px);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.88;
      white-space: nowrap;
    }

    .tool-btn .label-big {
      font-size: clamp(22px, 3.2vw, 45px);
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    /* ── Footer — layer 2 ── */
    footer {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 9px 20px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.58);
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(4px);
      border-top: 1px solid rgba(0, 0, 0, 0.07);
    }

    /* ── Responsive ── */

    /* Tablet — shrink preview image */
    @media (max-width: 900px) {
      .preview-img {
        width: clamp(80px, 11vw, 140px);
        top: 68px;
      }
    }

    /* Mobile — stack buttons, hide preview, swap background */
    @media (max-width: 580px) {
      .hero {
        background-image: url("./260506-background-login-dashboard-mobile.jpg");
      }

      .preview-img {
        display: none;
      }

      .content {
        padding: 28px 18px 36px;
      }

      .btn-grid {
        grid-template-columns: 1fr;
        max-width: 420px;
      }

      h1 {
        font-size: clamp(18px, 6vw, 28px);
      }
    }

    /* Very wide screens */
    @media (min-width: 1600px) {
      .preview-img {
        width: clamp(180px, 13vw, 220px);
      }
    }
  </style>
</head>
<body>
<div class="hero">
  <div class="hero-overlay"></div>

  <img
    class="preview-img"
    src="./260506-RBIM-model-login-dashboard.jpg"
    alt=""
    aria-hidden="true"
  />

  <div class="topbar">
    <div class="logo-pill">
      <img src="./logo_4d.jpg" alt="4D Architects logo" />
    </div>
    <div class="logo-pill">
      <img src="./eu.png" alt="European Union logo" />
    </div>
  </div>

  <main class="content">
    <h1>Decoding Circular Capacity of Buildings</h1>

    <nav class="btn-grid" aria-label="Tool selection">
      <a href="./dashboard/index.html" class="tool-btn dashboard">
        <span class="label-small">Green Circulair Building</span>
        <span class="label-big">DASHBOARD</span>
      </a>

      <a href="./rp_index_page/index.html" class="tool-btn rpindex">
        <span class="label-small">Reuse Potential Index</span>
        <span class="label-big">RP Index</span>
      </a>
    </nav>
  </main>

  <footer>
    <strong>©4D Architects Amsterdam</strong> &nbsp;|&nbsp; Method Dr. Elma Durmisevic
    &nbsp;|&nbsp; made by collaborall powered by ANT OS
  </footer>
</div>
</body>
</html>
